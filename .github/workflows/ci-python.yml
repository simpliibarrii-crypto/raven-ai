name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-asyncio ruff pynacl
      - name: Changed-code lint
        run: |
          ruff check \
            runtime/scientific_agent_gates.py \
            tests/test_scientific_agent_gates.py \
            --ignore=E501
      - name: Compile Python
        run: python -m compileall -q runtime tests
      - name: Tests
        id: tests
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest_findings.txt
        continue-on-error: true
      - name: Upload pytest findings
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pytest-findings-${{ matrix.python-version }}
          path: pytest_findings.txt
      - name: Enforce tests
        if: steps.tests.outcome == 'failure'
        run: exit 1

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
