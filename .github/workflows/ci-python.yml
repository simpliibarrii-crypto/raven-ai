name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    if: hashFiles('pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Public release scan
        run: python scripts/public_release_check.py
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-asyncio ruff black pynacl
      - name: Correctness lint
        run: ruff check . --select F
      - name: Compile Python
        run: python -m compileall -q runtime examples tests scripts
      - name: Full lint advisory
        run: ruff check .
        continue-on-error: true
      - name: Format check advisory
        run: black --check .
        continue-on-error: true
      - name: Tests
        run: pytest -q

  node:
    name: Node build
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm test --if-present

  rust:
    name: Rust check
    runs-on: ubuntu-latest
    if: hashFiles('Cargo.toml') != '' || hashFiles('src-tauri/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check root
        if: hashFiles('Cargo.toml') != ''
        run: cargo check
        continue-on-error: true
      - name: Cargo check Tauri
        if: hashFiles('src-tauri/Cargo.toml') != ''
        run: cargo check --manifest-path src-tauri/Cargo.toml
        continue-on-error: true

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks against repository history
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --verbose
