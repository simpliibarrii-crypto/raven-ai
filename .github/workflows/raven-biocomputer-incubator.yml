name: Raven BioComputer incubator

on:
  pull_request:
    paths:
      - "incubator/raven-biocomputer/**"
      - ".github/workflows/raven-biocomputer-incubator.yml"
  push:
    branches: [main]
    paths:
      - "incubator/raven-biocomputer/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: incubator/raven-biocomputer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: incubator/raven-biocomputer/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: python -m compileall -q raven_biocomputer.py app.py tests
