name: Bug report
description: Report a reproducible bug
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the project. Please include enough detail for a maintainer to reproduce the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. ...
2. ...
3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, branch/commit, install method
    validations:
      required: false
