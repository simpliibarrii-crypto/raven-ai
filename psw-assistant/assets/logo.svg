<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- openclinical-ai logo — v0.4.1
       Blood red maple leaf. Canadian identity + healthcare.
       Leaf: #8B0000 (blood red / darkred). Transparent background adapts to theme.
       Stylized — not the exact 11-point flag design. No trademark issues. -->
  <defs>
    <radialGradient id="leaf-grad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#C8102E;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C0000;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Stylized maple leaf — 5 main lobes, simplified geometry -->
  <path d="
    M 60 12
    L 64 32 L 78 22 L 74 38
    L 90 30 L 82 44
    L 98 42 L 86 54
    L 104 60 L 86 66
    L 98 78 L 82 76
    L 90 90 L 74 82
    L 78 98 L 64 88
    L 60 108
    L 56 88 L 42 98
    L 46 82 L 30 90
    L 38 76 L 22 78
    L 34 66 L 16 60
    L 34 54 L 22 42
    L 38 44 L 30 30
    L 46 38 L 42 22
    L 56 32
    Z
  " fill="url(#leaf-grad)" stroke="none"/>
  <!-- Subtle vein lines for depth -->
  <line x1="60" y1="22" x2="60" y2="98" stroke="#4A0000" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="45" x2="82" y2="34" stroke="#4A0000" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="45" x2="38" y2="34" stroke="#4A0000" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="65" x2="88" y2="58" stroke="#4A0000" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="65" x2="32" y2="58" stroke="#4A0000" stroke-width="0.8" opacity="0.25"/>
</svg>
